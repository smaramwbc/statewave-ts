name: ✨ Feature Request
description: Suggest a new feature or enhancement
title: "[Feature]: "
labels: ["feature", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe what you'd like to see.
        
        **Before submitting:**
        - Search [existing issues](https://github.com/smaramwbc/statewave/issues) to check if this has been requested
        - Consider if this fits Statewave's mission as a Memory OS for AI agents

  - type: dropdown
    id: feature-area
    attributes:
      label: Feature Area
      description: Which part of Statewave would this affect?
      options:
        - Backend API / Server
        - Python SDK (statewave-py)
        - TypeScript SDK (statewave-ts)
        - Documentation
        - Examples
        - Demo Site
        - Website
        - Admin Dashboard
        - New Integration
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: |
        What problem are you trying to solve? 
        A clear description of the pain point or use case.
      placeholder: |
        I'm trying to build an AI agent that needs to...
        Currently, Statewave doesn't support...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like to see.
      placeholder: |
        I'd like Statewave to...
        The API could look like...
    validations:
      required: true

  - type: textarea
    id: api-design
    attributes:
      label: API Design (if applicable)
      description: If you have ideas for how the API should look, describe it here.
      render: python
      placeholder: |
        # Example API usage
        client.new_method(param="value")

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Describe any alternative solutions or features you've considered.
      placeholder: |
        I considered using...
        Another approach might be...

  - type: dropdown
    id: priority
    attributes:
      label: Priority to You
      description: How important is this feature to your use case?
      options:
        - Critical - Blocking adoption
        - High - Major improvement needed
        - Medium - Would be helpful
        - Low - Nice to have
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add any other context, mockups, or examples about the feature request.

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      description: Would you be interested in contributing this feature?
      options:
        - label: I would be interested in contributing this feature
        - label: I would be interested in testing this feature

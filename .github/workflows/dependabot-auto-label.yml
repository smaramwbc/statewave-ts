# Auto-label Dependabot PRs
# This workflow automatically labels PRs from Dependabot
# Place this file in each repo's .github/workflows/ directory

name: Auto-label Dependabot

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Add labels to Dependabot PR
        uses: actions/github-script@v7
        with:
          script: |
            const labels = ['dependencies'];
            
            // Check PR title for security updates
            const title = context.payload.pull_request.title.toLowerCase();
            if (title.includes('security') || title.includes('vulnerability')) {
              labels.push('security');
            }
            
            // Check if it's a GitHub Actions update
            if (title.includes('actions/') || title.includes('github-actions')) {
              labels.push('ci');
            }
            
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: labels
            });
            
            console.log(`Added labels: ${labels.join(', ')}`);
